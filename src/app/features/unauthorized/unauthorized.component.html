<div style="
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 80vh; padding: 2rem; text-align: center;
">
  <div style="
    font-size: 5rem; font-weight: 800; color: #e2e8f0;
    line-height: 1; margin-bottom: 1rem; letter-spacing: -.04em;
  ">403</div>

  <div style="
    width: 56px; height: 56px; border-radius: 50%; background: #fef2f2;
    display: flex; align-items: center; justify-content: center; margin-bottom: 1.25rem;
  ">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
         stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>

  <h1 style="font-size: 1.35rem; font-weight: 700; color: #1e293b; margin: 0 0 .5rem">
    Acceso no autorizado
  </h1>
  <p style="font-size: .93rem; color: #64748b; max-width: 380px; margin: 0 0 .35rem">
    No tienes permiso para ver este contenido.
  </p>
  <p style="font-size: .88rem; color: #94a3b8; max-width: 380px; margin: 0 0 2rem">
    Si crees que deberías tener acceso, solicítalo a tu administrador.
  </p>

  <button
    (click)="goBack()"
    style="
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .55rem 1.2rem; border-radius: 8px;
      background: #f8fafc; border: 1.5px solid #e2e8f0;
      font-size: .88rem; font-weight: 600; color: #475569;
      cursor: pointer; transition: background .15s;
    "
    onmouseover="this.style.background='#f1f5f9'"
    onmouseout="this.style.background='#f8fafc'"
  >
    <svg width="14" height="14" viewBox="0 0 20 20" fill="none"
         stroke="currentColor" stroke-width="2.2">
      <path d="M13 17l-7-7 7-7"/>
    </svg>
    Volver
  </button>
</div>
