<div class="modal-backdrop" (click)="closed.emit()">
  <div class="modal-box bulk-reclasify-box" (click)="$event.stopPropagation()">

    <div class="modal-head">
      <div>
        <div class="modal-title">Reclasificar movimientos</div>
        <div class="modal-sub">{{ ids.length }} movimiento{{ ids.length > 1 ? 's' : '' }} seleccionado{{ ids.length > 1 ? 's' : '' }}</div>
      </div>
      <button class="modal-close" (click)="closed.emit()">✕</button>
    </div>

    <div class="modal-body">

      <div class="form-field">
        <label class="form-label">¿Qué querés cambiar?</label>
        <div class="rule-accion-grid bulk-reclasify-mode-grid">
          <label class="rule-accion-card" [class.active]="mode === 'status'" (click)="selectMode('status')">
            <input type="radio" name="bulk-mode" [checked]="mode === 'status'" style="display:none">
            <span class="rule-accion-card-dot"></span>
            <span class="rule-accion-card-title">Por estatus</span>
          </label>
          <label class="rule-accion-card" [class.active]="mode === 'categoria'" [class.disabled]="!canUseCategoria"
                 (click)="selectMode('categoria')" [title]="!canUseCategoria ? 'No tenés permiso para recategorizar' : ''">
            <input type="radio" name="bulk-mode" [checked]="mode === 'categoria'" style="display:none">
            <span class="rule-accion-card-dot"></span>
            <span class="rule-accion-card-title">Por categoría</span>
          </label>
        </div>
      </div>

      <div *ngIf="mode === 'status'" class="bulk-reclasify-hint">
        Se cambiará el estado de <strong>{{ ids.length }}</strong> movimiento{{ ids.length > 1 ? 's' : '' }} a <strong>Por conciliar</strong>.
      </div>

      <div *ngIf="mode === 'categoria'" class="form-field">
        <label class="form-label">Categoría</label>
        <input class="form-input" type="text" [(ngModel)]="categoriaSeleccionada"
               list="bulk-cat-list" placeholder="Escribir o seleccionar… (vacío = quitar categoría)" autocomplete="off">
        <datalist id="bulk-cat-list">
          <option *ngFor="let cat of categorias" [value]="cat"></option>
        </datalist>
      </div>

      <p *ngIf="error" class="form-error">{{ error }}</p>

    </div>

    <div class="modal-foot">
      <button class="btn-ghost" (click)="closed.emit()" [disabled]="saving">Cancelar</button>
      <button class="btn-import" (click)="confirm()" [disabled]="saving">
        <div *ngIf="saving" class="spinner spinner-sm"></div>
        {{ saving ? 'Guardando…' : 'Confirmar' }}
      </button>
    </div>

  </div>
</div>
