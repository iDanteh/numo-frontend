<ng-container *ngIf="auth.hasRole('admin')">

  <!-- Trigger + dropdown menu -->
  <div class="admin-dropdown-wrap" (click)="$event.stopPropagation()">
    <button class="btn-icon btn-icon-admin"
            [class.is-open]="adminDropdownOpen"
            (click)="toggleDropdown()"
            title="Herramientas de administrador">
      <svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M10 2L3 5v5c0 4.4 3 8.3 7 9.3 4-1 7-4.9 7-9.3V5l-7-3z"/>
      </svg>
      <span>Admins</span>
      <svg class="dropdown-chevron" width="10" height="10" viewBox="0 0 12 12" fill="none"
           stroke="currentColor" stroke-width="2.2">
        <path d="M2 4l4 4 4-4"/>
      </svg>
    </button>

    <div class="admin-dropdown-menu" *ngIf="adminDropdownOpen">
      <div class="admin-menu-header">Herramientas ERP</div>

      <!-- Match ERP -->
      <button class="admin-menu-item"
              (click)="runMatchErp(); adminDropdownOpen=false"
              [disabled]="matchingErp || revertingErp"
              title="Cruzar cuentas ERP con movimientos bancarios">
        <div *ngIf="matchingErp" class="spinner spinner-sm"></div>
        <svg *ngIf="!matchingErp" width="14" height="14" viewBox="0 0 20 20" fill="none"
             stroke="currentColor" stroke-width="2.2">
          <circle cx="10" cy="10" r="7"/><path d="M7 10l2 2 4-4"/>
        </svg>
        {{ matchingErp ? 'Procesando…' : 'Match ERP' }}
      </button>

      <!-- Sync Saldo Transferencia -->
      <button class="admin-menu-item"
              (click)="runSyncSaldoTransferencia(); adminDropdownOpen=false"
              [disabled]="saldoSyncRunning"
              title="Actualiza el Saldo ERP de movimientos vinculados con el monto exacto cobrado por transferencia en Kore">
        <div *ngIf="saldoSyncRunning" class="spinner spinner-sm"></div>
        <svg *ngIf="!saldoSyncRunning" width="14" height="14" viewBox="0 0 20 20" fill="none"
             stroke="currentColor" stroke-width="2.2">
          <path d="M3 10a7 7 0 0 1 14 0M3 10h3l-2-2M3 10l2 2"/>
          <path d="M10 7v3l2 2"/>
        </svg>
        {{ saldoSyncRunning ? 'Sincronizando…' : 'Sync Saldo ERP' }}
      </button>


      <!-- Revertir ERP -->
      <button class="admin-menu-item admin-menu-item--warn"
              (click)="runRevertMatchErp(); adminDropdownOpen=false"
              [disabled]="matchingErp || revertingErp"
              title="Revertir todas las asociaciones del motor ERP">
        <div *ngIf="revertingErp" class="spinner spinner-sm"></div>
        <svg *ngIf="!revertingErp" width="14" height="14" viewBox="0 0 20 20" fill="none"
             stroke="currentColor" stroke-width="2.2">
          <path d="M4 10a6 6 0 1 0 1.5-4M4 6v4h4"/>
        </svg>
        {{ revertingErp ? 'Revirtiendo…' : 'Revertir ERP' }}
      </button>

      <div class="admin-menu-divider"></div>
      <div class="admin-menu-header">Archivos</div>

      <!-- Autorizaciones -->
      <label class="admin-menu-item" [class.is-loading]="matchingAuts"
             title="Cargar Excel de autorizaciones">
        <input type="file" accept=".xlsx,.xls" style="display:none"
               (change)="onAutsFileSelected($event)" [disabled]="matchingAuts">
        <div *ngIf="matchingAuts" class="spinner spinner-sm"></div>
        <svg *ngIf="!matchingAuts" width="14" height="14" viewBox="0 0 20 20" fill="none"
             stroke="currentColor" stroke-width="2.2">
          <path d="M9 12l2 2 4-4"/><path d="M5 7H3a2 2 0 00-2 2v8a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-2"/>
          <path d="M13 3H7v8h6V3z"/>
        </svg>
        {{ matchingAuts ? 'Procesando…' : 'Autorizaciones' }}
      </label>

      <!-- Refact. CYC -->
      <label class="admin-menu-item admin-menu-item--blue"
             [class.is-loading]="procesandoCyc"
             title="Cargar Excel de Refacturaciones CYC">
        <input type="file" accept=".xlsx,.xls" style="display:none"
               (change)="onCycFileSelected($event)" [disabled]="procesandoCyc">
        <div *ngIf="procesandoCyc" class="spinner spinner-sm"></div>
        <svg *ngIf="!procesandoCyc" width="14" height="14" viewBox="0 0 20 20" fill="none"
             stroke="currentColor" stroke-width="2.2">
          <path d="M4 4h12v3H4zM4 10h6M4 14h8"/><path d="M14 13l2 2 3-3"/>
        </svg>
        {{ procesandoCyc ? 'Procesando…' : 'Refact. CYC' }}
      </label>

      <!-- Mostrador CYC -->
      <label class="admin-menu-item admin-menu-item--green"
             [class.is-loading]="procesandoMostrador"
             title="Cargar Excel Mostrador CYC — relaciona depósitos con CxC por folio">
        <input type="file" accept=".xlsx,.xls" style="display:none"
               (change)="onMostradorFileSelected($event)" [disabled]="procesandoMostrador">
        <div *ngIf="procesandoMostrador" class="spinner spinner-sm"></div>
        <svg *ngIf="!procesandoMostrador" width="14" height="14" viewBox="0 0 20 20" fill="none"
             stroke="currentColor" stroke-width="2.2">
          <path d="M4 4h12v3H4zM4 10h8M4 14h6"/><path d="M15 12v6M12 15h6"/>
        </svg>
        {{ procesandoMostrador ? 'Procesando…' : 'Mostrador CYC' }}
      </label>

      <!-- Pagos CYC -->
      <label class="admin-menu-item admin-menu-item--violet"
             [class.is-loading]="procesandoPagos"
             title="Cargar Excel Pagos CYC — relaciona depósitos con CxC por folio (formato 5 columnas)">
        <input type="file" accept=".xlsx,.xls" style="display:none"
               (change)="onPagosFileSelected($event)" [disabled]="procesandoPagos">
        <div *ngIf="procesandoPagos" class="spinner spinner-sm"></div>
        <svg *ngIf="!procesandoPagos" width="14" height="14" viewBox="0 0 20 20" fill="none"
             stroke="currentColor" stroke-width="2.2">
          <path d="M4 4h12v3H4zM4 10h8M4 14h6"/><path d="M13 14l2 2 4-4"/>
        </svg>
        {{ procesandoPagos ? 'Procesando…' : 'Pagos CYC' }}
      </label>

      <div class="admin-menu-divider"></div>
      <div class="admin-menu-header">Conciliación histórica</div>

      <!-- Importar conciliación desde Excel -->
      <label class="admin-menu-item admin-menu-item--teal"
             [class.is-loading]="importandoConciliacion"
             title="Cargar Excel con fecha_deposito, banco y monto_deposito para marcar movimientos como identificados">
        <input type="file" accept=".xlsx,.xls" style="display:none"
               (change)="onImportarConciliacionFile($event); adminDropdownOpen=false"
               [disabled]="importandoConciliacion || revirtandoConciliacion">
        <div *ngIf="importandoConciliacion" class="spinner spinner-sm"></div>
        <svg *ngIf="!importandoConciliacion" width="14" height="14" viewBox="0 0 20 20" fill="none"
             stroke="currentColor" stroke-width="2.2">
          <path d="M4 4h12v3H4zM4 10h6M4 14h8"/><path d="M14 13l2 2 3-3"/>
        </svg>
        {{ importandoConciliacion ? 'Procesando…' : 'Importar conciliación' }}
      </label>

      <!-- Identificar anteriores a mayo — oculto temporalmente -->
      <!-- <button class="admin-menu-item admin-menu-item--teal"
              (click)="runIdentificarAnteriores(); adminDropdownOpen=false"
              [disabled]="identificandoAnteriores || revirtandoAnteriores"
              title="Marcar como identificados todos los movimientos 'no identificados' anteriores al 1 de mayo">
        <div *ngIf="identificandoAnteriores" class="spinner spinner-sm"></div>
        <svg *ngIf="!identificandoAnteriores" width="14" height="14" viewBox="0 0 20 20" fill="none"
             stroke="currentColor" stroke-width="2.2">
          <path d="M4 10l4 4 8-8"/>
          <circle cx="10" cy="10" r="8"/>
        </svg>
        {{ identificandoAnteriores ? 'Procesando…' : 'Identificar pre-mayo' }}
      </button> -->

      <!-- Revertir identificación masiva pre-mayo — oculto temporalmente -->
      <!-- <button class="admin-menu-item admin-menu-item--warn"
              (click)="runRevertirAnteriores(); adminDropdownOpen=false"
              [disabled]="identificandoAnteriores || revirtandoAnteriores"
              title="Revertir la identificación masiva pre-mayo (preserva identificaciones manuales de usuarios)">
        <div *ngIf="revirtandoAnteriores" class="spinner spinner-sm"></div>
        <svg *ngIf="!revirtandoAnteriores" width="14" height="14" viewBox="0 0 20 20" fill="none"
             stroke="currentColor" stroke-width="2.2">
          <path d="M3 7h9a5 5 0 010 10H7M3 7l4-4M3 7l4 4"/>
        </svg>
        {{ revirtandoAnteriores ? 'Revirtiendo…' : 'Revertir pre-mayo' }}
      </button> -->

      <div class="admin-menu-divider"></div>
      <div class="admin-menu-header">Análisis</div>

      <!-- Duplicados potenciales -->
      <button class="admin-menu-item admin-menu-item--amber"
              (click)="openDuplicates.emit(); adminDropdownOpen=false"
              title="Detectar movimientos bancarios potencialmente duplicados">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none"
             stroke="currentColor" stroke-width="2.2">
          <circle cx="10" cy="10" r="7"/>
          <path d="M10 7v3M10 13h.01"/>
        </svg>
        Duplicados
      </button>
    </div>
  </div>

  <!-- Barra de progreso inline del sync saldo transferencia -->
  <div *ngIf="saldoSyncRunning && saldoSyncMsg" class="erp-progress-inline">
    <div class="erp-progress-track">
      <div class="erp-progress-fill" [style.width.%]="saldoSyncPct"></div>
    </div>
    <span class="erp-progress-msg">
      <ng-container *ngIf="saldoSyncStatus === 'paused'">En pausa — </ng-container>{{ saldoSyncMsg }}
    </span>
    <span class="erp-sync-controls">
      <button *ngIf="saldoSyncStatus === 'running'"
              (click)="pauseSyncSaldoTransferencia()"
              class="erp-ctrl-btn" title="Pausar">⏸</button>
      <button *ngIf="saldoSyncStatus === 'paused'"
              (click)="resumeSyncSaldoTransferencia()"
              class="erp-ctrl-btn erp-ctrl-btn--ok" title="Reanudar">▶</button>
      <button (click)="stopSyncSaldoTransferencia()"
              class="erp-ctrl-btn erp-ctrl-btn--stop" title="Detener">⏹</button>
    </span>
  </div>

  <!-- Barra de progreso inline del match ERP -->
  <div *ngIf="matchingErp && matchErpPhase" class="erp-progress-inline">
    <div class="erp-progress-track">
      <div class="erp-progress-fill" [style.width.%]="matchErpPct"></div>
    </div>
    <span class="erp-progress-msg">{{ matchErpPhase }}</span>
  </div>

</ng-container>
