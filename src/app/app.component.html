<!-- Loading while Auth0 initializes -->
<ng-container *ngIf="auth.isLoading; else ready">
  <div class="app-init-loader">
    <div class="app-init-spinner"></div>
  </div>
</ng-container>

<ng-template #ready>

  <!-- Authenticated: sidebar + content -->
  <ng-container *ngIf="auth.isAuthenticated; else noLayout">
    <div class="app-layout">
      <app-sidebar></app-sidebar>
      <main class="main-content">
        <router-outlet></router-outlet>
      </main>
    </div>
  </ng-container>

  <!-- Public pages (login, etc.) -->
  <ng-template #noLayout>
    <router-outlet></router-outlet>
  </ng-template>

</ng-template>

<style>
.app-init-loader {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: #0f172a;
}
.app-init-spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(99,102,241,.2);
  border-top-color: #6366f1;
  border-radius: 50%;
  animation: spin .75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
