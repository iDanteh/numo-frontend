<div class="toast-container">
  <div
    *ngFor="let t of items"
    class="toast-item toast--{{ t.type }}"
    [class.toast--leaving]="t.leaving"
    (click)="dismiss(t.id)"
  >
    <span class="toast-icon">{{ icon(t.type) }}</span>
    <span class="toast-msg">{{ t.message }}</span>
    <button class="toast-close" (click)="dismiss(t.id)">✕</button>
  </div>
</div>

<style>
.toast-container {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: .5rem;
  pointer-events: none;
}

.toast-item {
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: .65rem 1rem;
  border-radius: 8px;
  border-left: 4px solid;
  font-size: .875rem;
  font-weight: 500;
  min-width: 240px;
  max-width: 380px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.06);
  pointer-events: all;
  cursor: pointer;
  animation: toast-in .28s cubic-bezier(.22,1,.36,1) both;
  transition: opacity .28s, transform .28s;
  color: #1e293b;
}

.toast-item.toast--leaving {
  opacity: 0;
  transform: translateX(1.5rem);
}

.toast--success { background: #d1fae5; border-color: #10b981; }
.toast--error   { background: #fee2e2; border-color: #ef4444; }
.toast--warning { background: #fef3c7; border-color: #f59e0b; }
.toast--info    { background: #dbeafe; border-color: #3b82f6; }

.toast-icon {
  font-size: 1rem;
  flex-shrink: 0;
  width: 1.25rem;
  text-align: center;
}

.toast--success .toast-icon { color: #10b981; }
.toast--error   .toast-icon { color: #ef4444; }
.toast--warning .toast-icon { color: #f59e0b; }
.toast--info    .toast-icon { color: #3b82f6; }

.toast-msg {
  flex: 1;
  line-height: 1.4;
}

.toast-close {
  background: none;
  border: none;
  color: #94a3b8;
  cursor: pointer;
  font-size: .8rem;
  padding: 0;
  flex-shrink: 0;
  line-height: 1;
}
.toast-close:hover { color: #475569; }

@keyframes toast-in {
  from { opacity: 0; transform: translateX(1.5rem); }
  to   { opacity: 1; transform: translateX(0); }
}
</style>
