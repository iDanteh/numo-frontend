<div class="toast-container">
  <div
    *ngFor="let t of items"
    class="toast-item toast--{{ t.type }}"
    [class.toast--leaving]="t.leaving"
    (click)="dismiss(t.id)"
  >
    <span class="toast-icon">{{ icon(t.type) }}</span>
    <span class="toast-msg">{{ t.message }}</span>
    <button class="toast-close" (click)="dismiss(t.id)">✕</button>
  </div>
</div>

<style>
.toast-container {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: .5rem;
  pointer-events: none;
}

.toast-item {
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: .65rem 1rem;
  border-radius: 8px;
  font-size: .875rem;
  font-weight: 500;
  min-width: 240px;
  max-width: 380px;
  box-shadow: 0 4px 16px rgba(0,0,0,.35);
  pointer-events: all;
  cursor: pointer;
  animation: toast-in .28s cubic-bezier(.22,1,.36,1) both;
  transition: opacity .28s, transform .28s;
  color: #fff;
}

.toast-item.toast--leaving {
  opacity: 0;
  transform: translateX(1.5rem);
}

.toast--success { background: #16a34a; }
.toast--error   { background: #dc2626; }
.toast--warning { background: #d97706; }
.toast--info    { background: #2563eb; }

.toast-icon {
  font-size: 1rem;
  flex-shrink: 0;
  width: 1.25rem;
  text-align: center;
}

.toast-msg {
  flex: 1;
  line-height: 1.4;
}

.toast-close {
  background: none;
  border: none;
  color: rgba(255,255,255,.7);
  cursor: pointer;
  font-size: .8rem;
  padding: 0;
  flex-shrink: 0;
  line-height: 1;
}
.toast-close:hover { color: #fff; }

@keyframes toast-in {
  from { opacity: 0; transform: translateX(1.5rem); }
  to   { opacity: 1; transform: translateX(0); }
}
</style>
